<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login | AASTPharma</title>
	<style>
		:root {
			color-scheme: light;
			--bg: #f4f7fb;
			--card: #ffffff;
			--text: #182433;
			--muted: #66758a;
			--primary: #1565d8;
			--primary-dark: #0f4ea7;
			--border: #dbe4ee;
			--shadow: 0 18px 50px rgba(18, 38, 63, 0.12);
			--radius: 18px;
			--font: Arial, Helvetica, sans-serif;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: var(--font);
			color: var(--text);
			background:
				radial-gradient(circle at top left, rgba(21, 101, 216, 0.16), transparent 28%),
				radial-gradient(circle at bottom right, rgba(44, 184, 255, 0.14), transparent 26%),
				var(--bg);
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.auth-shell {
			width: 100%;
			max-width: 420px;
		}

		.brand {
			margin-bottom: 16px;
			font-size: 0.95rem;
			font-weight: 700;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: var(--primary-dark);
		}

		.card {
			background: var(--card);
			border: 1px solid rgba(219, 228, 238, 0.9);
			border-radius: var(--radius);
			box-shadow: var(--shadow);
			padding: 32px;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 2rem;
			line-height: 1.1;
		}

		p {
			margin: 0;
			color: var(--muted);
			line-height: 1.5;
		}

		form {
			margin-top: 24px;
			display: grid;
			gap: 16px;
		}

		label {
			display: grid;
			gap: 8px;
			font-size: 0.95rem;
			font-weight: 600;
		}

		input {
			width: 100%;
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 14px 16px;
			font: inherit;
			background: #fff;
			color: var(--text);
			outline: none;
			transition: border-color 0.15s ease, box-shadow 0.15s ease;
		}

		input:focus {
			border-color: var(--primary);
			box-shadow: 0 0 0 4px rgba(21, 101, 216, 0.12);
		}

		.actions {
			display: grid;
			gap: 12px;
			margin-top: 4px;
		}

		button {
			border: 0;
			border-radius: 12px;
			padding: 14px 16px;
			font: inherit;
			font-weight: 700;
			cursor: pointer;
			background: linear-gradient(135deg, var(--primary), var(--primary-dark));
			color: #fff;
			box-shadow: 0 12px 24px rgba(21, 101, 216, 0.24);
			transition: transform 0.15s ease, box-shadow 0.15s ease;
		}

		button:hover {
			transform: translateY(-1px);
			box-shadow: 0 16px 28px rgba(21, 101, 216, 0.28);
		}

		.link {
			text-align: center;
			font-size: 0.95rem;
			color: var(--muted);
		}

		.link a {
			color: var(--primary-dark);
			font-weight: 700;
			text-decoration: none;
		}

		.link a:hover {
			text-decoration: underline;
		}

		@media (max-width: 480px) {
			.card {
				padding: 24px;
			}

			h1 {
				font-size: 1.7rem;
			}
		}
	</style>
</head>
<body>
	<main class="auth-shell">
		<div class="brand">AASTPharma</div>
		<section class="card" aria-labelledby="login-title">
			<h1 id="login-title">Welcome back</h1>
			<p>Sign in to continue to your account.</p>

			<form action="#" method="post">
				<label for="email">
					Email
					<input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
				</label>

				<label for="password">
					Password
					<input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
				</label>

				<div class="actions">
					<button type="submit">Log in</button>
					<div class="link">No account? <a href="register.html">Create one</a></div>
				</div>
			</form>
		</section>
	</main>
</body>
</html>
